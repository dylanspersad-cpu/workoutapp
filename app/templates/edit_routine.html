{% extends "authenticated-base.html" %}
{% block title %}Edit Routine | Workout Remixer{% endblock %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="fw-bold mb-3">Edit Routine</h2>
                    <form method="POST" action="/routines/{{ routine.id }}/edit">
                        <div class="mb-3">
                            <label class="form-label">Routine Name</label>
                            <input type="text" class="form-control" name="name" value="{{ routine.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="4">{{ routine.description }}</textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Update Routine</button>
                            <a href="/routines/{{ routine.id }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
